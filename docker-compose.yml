version: "3.9"

services:
  # --- Streaming backbone (Redpanda = Kafka-API compatible, single-binary, good for dev) ---
  redpanda:
    image: redpandadata/redpanda:v24.1.9
    container_name: eskos-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  # Topic bootstrap — creates all Phase 3 topics on startup
  redpanda-init-topics:
    image: redpandadata/redpanda:v24.1.9
    depends_on:
      - redpanda
    entrypoint: /bin/bash
    command:
      - -c
      - |
        sleep 5;
        rpk topic create raw-ingest --brokers redpanda:9092 --partitions 6 || true;
        rpk topic create hygiene-passed --brokers redpanda:9092 --partitions 6 || true;
        rpk topic create hygiene-quarantine --brokers redpanda:9092 --partitions 3 || true;
        rpk topic create dlq.schema-violation --brokers redpanda:9092 --partitions 3 || true;
        rpk topic create dlq.spam-detected --brokers redpanda:9092 --partitions 3 || true;
        rpk topic create dlq.parse-failed --brokers redpanda:9092 --partitions 3 || true;
        rpk topic create dlq.prompt-injection --brokers redpanda:9092 --partitions 3 || true;
        rpk topic create dlq.circuit-broken --brokers redpanda:9092 --partitions 3 || true;
        rpk topic create knowledge-fabric-ingest --brokers redpanda:9092 --partitions 6 || true;

  # --- Redis: JA4 reputation table, dedup LSH index, circuit breaker state ---
  redis:
    image: redis:7-alpine
    container_name: eskos-redis
    ports:
      - "6380:6379"

  # --- Kong API Gateway (declarative / DB-less mode) ---
  kong:
    image: kong:3.7
    container_name: eskos-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./gateway/kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"   # proxy
      - "8001:8001"   # admin API

  # --- Hygiene pipeline (Python stand-in for the Flink job) ---
  hygiene-pipeline:
    build: ./services/hygiene-pipeline
    container_name: eskos-hygiene-pipeline
    depends_on:
      - redpanda
      - redis
    environment:
      KAFKA_BROKERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

  # --- Pre-flight Planner ---
  preflight-planner:
    build: ./services/preflight-planner
    container_name: eskos-preflight-planner
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:9092
    restart: unless-stopped

  # --- Trust Score service ---
  trust-score:
    build: ./services/trust-score
    container_name: eskos-trust-score
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

  # --- Neo4j Graph Database (Knowledge Graph) ---
  neo4j:
    image: neo4j:5.21-community
    container_name: eskos-neo4j
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/eskospass123
      NEO4J_PLUGINS: '["apoc"]'
    restart: unless-stopped

  # --- Qdrant Vector Store (Multi-RAG Storage) ---
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: eskos-qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # --- PostgreSQL Database (Metadata Registry & Provenance) ---
  postgres:
    image: postgres:16-alpine
    container_name: eskos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: eskos
      POSTGRES_PASSWORD: eskosdbpass123
      POSTGRES_DB: eskos_knowledge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Knowledge Fabric Service ---
  knowledge-fabric:
    build: ./services/knowledge-fabric
    container_name: eskos-knowledge-fabric
    ports:
      - "8090:8090"
    depends_on:
      - redpanda
      - redis
      - neo4j
      - qdrant
      - postgres
    environment:
      KAFKA_BROKERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: eskospass123
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      POSTGRES_HOST: postgres
      POSTGRES_USER: eskos
      POSTGRES_PASSWORD: eskosdbpass123
      POSTGRES_DB: eskos_knowledge
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: unless-stopped

  # --- Agent Runtime ---
  agent-runtime:
    build: ./services/agent-runtime
    container_name: eskos-agent-runtime
    ports:
      - "8091:8091"
    depends_on:
      - knowledge-fabric
    volumes:
      - ./services/agent-runtime/config:/app/config
      - ./services/agent-runtime/data:/app/data
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-3.5-flash
      KONG_BASE_URL: http://kong:8000
      PORT: 8091
    restart: unless-stopped

  # --- Content Governance Service (Phase 5) ---
  content-governance:
    build: ./services/content-governance
    container_name: eskos-content-governance
    ports:
      - "8081:8081"
    environment:
      GOVERNANCE_DB_PATH: /data/governance.db
    volumes:
      - governance_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  governance_data:
