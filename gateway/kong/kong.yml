_format_version: "3.0"
_transform: true

# ── Services ──────────────────────────────────────────────────────────────
services:

  # ── Ingest path (write): via Hygiene Pipeline ─────────────────────────
  - name: knowledge-ingest-service
    url: http://hygiene-pipeline:8000
    routes:
      - name: ingest-route
        paths:
          - /api/v1/knowledge/ingest
        methods: [POST]
        protocols: [http, https]
        strip_path: false

  # ── Knowledge Fabric: all read/write endpoints ────────────────────────
  - name: knowledge-fabric-service
    url: http://knowledge-fabric:8090
    connect_timeout: 30000
    read_timeout:    30000
    write_timeout:   30000
    plugins:
      # CORS for all Knowledge Fabric routes (browser + Ngrok origins)
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "https://*.ngrok-free.app"
            - "https://*.ngrok-free.dev"
          methods: [GET, POST, OPTIONS]
          headers: [Accept, Content-Type, ngrok-skip-browser-warning]
          credentials: false
          max_age: 3600
      # Global IP-based rate limiting on all Knowledge Fabric reads
      - name: rate-limiting
        config:
          minute: 300
          policy: local
    routes:
      - name: knowledge-store-route
        paths:
          - /api/v1/knowledge/store
        methods: [POST, OPTIONS]
        protocols: [http, https]
        strip_path: false

      - name: knowledge-document-route
        paths:
          - /api/v1/knowledge/document
        methods: [GET, OPTIONS]
        protocols: [http, https]
        strip_path: false

      - name: knowledge-query-route
        paths:
          - /api/v1/knowledge/query
        methods: [POST, OPTIONS]
        protocols: [http, https]
        strip_path: false

      - name: knowledge-context-route
        paths:
          - /api/v1/knowledge/context
        methods: [POST, OPTIONS]
        protocols: [http, https]
        strip_path: false

      - name: knowledge-entity-route
        paths:
          - /api/v1/knowledge/entity
        methods: [GET, OPTIONS]
        protocols: [http, https]
        strip_path: false

      - name: knowledge-fabric-health-route
        paths:
          - /healthz
        methods: [GET, OPTIONS]
        protocols: [http, https]
        strip_path: false

  # ── Trust Score Service ───────────────────────────────────────────────
  - name: trust-score-service
    url: http://trust-score:8080
    routes:
      - name: trust-score-route
        paths:
          - /api/v1/knowledge/trust-score
        methods: [GET, POST, OPTIONS]
        protocols: [http, https]
        strip_path: false

      - name: seo-metrics-route
        paths:
          - /api/v1/metrics/seo
        methods: [POST, OPTIONS]
        protocols: [http, https]
        strip_path: false

  # ── Content Governance Service ────────────────────────────────────────
  - name: content-governance-service
    url: http://content-governance:8081
    plugins:
      # CORS for all Governance routes
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "https://*.ngrok-free.app"
            - "https://*.ngrok-free.dev"
          methods: [GET, POST, OPTIONS]
          headers: [Accept, Content-Type, ngrok-skip-browser-warning]
          credentials: false
          max_age: 3600
    routes:
      - name: governance-submit-route
        paths:
          - /api/v1/governance/drafts
        methods: [POST, OPTIONS]
        protocols: [http, https]
        strip_path: false

      - name: governance-list-route
        paths:
          - /api/v1/governance/drafts
        methods: [GET, OPTIONS]
        protocols: [http, https]
        strip_path: false

      - name: governance-review-route
        paths:
          - /api/v1/governance/drafts
        methods: [POST, OPTIONS]
        protocols: [http, https]
        strip_path: false

      - name: governance-audit-route
        paths:
          - /api/v1/governance/audit
        methods: [GET, OPTIONS]
        protocols: [http, https]
        strip_path: false

# ── Plugins (global-level) ───────────────────────────────────────────────
plugins:
  # Request size guard on ingest write path (50 MB max)
  - name: request-size-limiting
    route: ingest-route
    config:
      allowed_payload_size: 50

  # Rate limiting on ingest write path (600 req/min per IP)
  - name: rate-limiting
    route: ingest-route
    config:
      minute: 600
      policy: local

  # Audit log on ingest — writes to stdout (captured by Docker logs)
  - name: file-log
    route: ingest-route
    config:
      path: /dev/stdout
      reopen: true

  # Audit log on governance review decisions
  - name: file-log
    route: governance-review-route
    config:
      path: /dev/stdout
      reopen: true

# ── Consumers ────────────────────────────────────────────────────────────
consumers:
  - username: eskos-dashboard
    tags: [tier-2, org:internal]

  - username: public-partner-upload
    tags: [tier-4, org:unverified]

  - username: borosil-erp-connector
    tags: [tier-1, org:borosil-scientific]

  - username: goel-erp-connector
    tags: [tier-1, org:goel-scientific]
